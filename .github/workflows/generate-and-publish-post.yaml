name: Generate And Publish Post

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional post date in YYYY-MM-DD format"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-post-content:
    name: Generate Post Content
    runs-on: ubuntu-latest
    env:
      GEMINI_API_TOKEN: ${{ secrets.GEMINI_API_TOKEN }}
      POST_DATE: ${{ inputs.date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run content generation
        run: |
          if [ -n "$POST_DATE" ]; then
            python tools/generate-post-content.py --date "$POST_DATE"
          else
            python tools/generate-post-content.py
          fi

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: generate post content"
            git push
          else
            echo "No changes to commit."
          fi

  publish-to-instagram:
    name: Publish To Instagram
    runs-on: ubuntu-latest
    needs: generate-post-content
    if: ${{ needs.generate-post-content.result == 'success' }}
    env:
      META_API_TOKEN: ${{ secrets.META_API_TOKEN }}
      PAGE_ID: ${{ secrets.PAGE_ID }}
      BASE_IMAGE_URL: ${{ vars.BASE_IMAGE_URL }}
      POST_DATE: ${{ inputs.date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Instagram publish
        run: |
          if [ -n "$POST_DATE" ]; then
            python tools/publish-to-instagram.py --date "$POST_DATE"
          else
            python tools/publish-to-instagram.py
          fi

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: mark post as published"
            git push
          else
            echo "No changes to commit."
          fi
  
